<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <!-- Login Page -->
    <div id="login-page" class="page">
      <header>
        <h1>Jira Worklog</h1>
      </header>

      <section class="section">
        <h2>Connect to Jira</h2>
        <div class="form-group">
          <label for="jira-domain">Jira Domain</label>
          <input type="text" id="jira-domain" placeholder="yourcompany" maxlength="100" autocomplete="off">
        </div>
        <div class="form-group">
          <label for="jira-email">Email</label>
          <input type="email" id="jira-email" placeholder="your@email.com" maxlength="254" autocomplete="email">
        </div>
        <div class="form-group">
          <label for="jira-token">API Token</label>
          <input type="password" id="jira-token" placeholder="Your Jira API token" maxlength="500" autocomplete="off">
        </div>
        <button id="login-btn" class="btn btn-primary">Connect</button>
        <div id="login-error" class="error-message"></div>
      </section>
    </div>

    <!-- Main Page -->
    <div id="main-page" class="page" style="display: none;">
      <header>
        <h1>Jira Worklog</h1>
        <div class="header-actions">
          <button id="overview-btn" class="btn-link" title="Month overview">Cal</button>
          <button id="refresh-btn" class="btn-link" title="Refresh all data">&#8635;</button>
          <button id="settings-btn" class="btn-link btn-settings" title="Settings">&#9881;</button>
        </div>
      </header>

      <!-- Settings Sheet (hidden by default) -->
      <div id="settings-sheet" class="settings-sheet" style="display: none;">
        <div class="settings-sheet-header">
          <h2>Settings</h2>
          <button id="settings-close" class="btn-icon" title="Close settings">×</button>
        </div>
        <div class="settings-group">
          <label for="daily-hours">Daily target (hours)</label>
          <input type="number" id="daily-hours" class="target-input" value="8" min="1" max="24">
        </div>
        <div class="settings-group">
          <label class="settings-toggle-label">
            <input type="checkbox" id="auto-advance">
            <span>Auto-advance to next workday when target met</span>
          </label>
        </div>
        <div class="settings-group">
          <label class="settings-toggle-label">
            <input type="checkbox" id="wiggle-enabled">
            <span>Wiggle time (randomize durations)</span>
          </label>
          <div class="wiggle-input-group" style="display: none;">
            <label for="wiggle-value">Max variation (min)</label>
            <input type="number" id="wiggle-value" min="1" max="30" value="10" title="Maximum random minutes to shave off">
          </div>
        </div>
        <div class="settings-group">
          <button id="logout-btn" class="btn btn-secondary">Logout</button>
        </div>
      </div>

      <!-- Card 1: Log (primary) -->
      <section class="section log-card">
        <!-- Date -->
        <div class="date-picker-header">
          <button type="button" id="prev-day" class="date-nav-btn">‹</button>
          <div class="date-display">
            <input type="date" id="work-date" class="date-input-main">
            <span id="date-label" class="date-label">Today</span>
          </div>
          <button type="button" id="next-day" class="date-nav-btn">›</button>
        </div>
        <button type="button" id="last-unlogged-day" class="btn-last-unlogged" title="Jump to last workday without worklogs">Last unlogged day</button>

        <!-- Target progress strip -->
        <div class="target-strip">
          <div class="target-inline">
            <span class="summary-label">Logged</span>
            <span id="logged-hours" class="summary-value">0h 0m</span>
            <span class="target-inline-sep"></span>
            <span class="summary-label">Left today</span>
            <span id="remaining-hours" class="summary-value remaining-value">8h 0m</span>
          </div>
          <div class="target-bar"><div id="target-bar-fill" class="target-bar-fill"></div></div>
        </div>

        <!-- Ticket picker (dropdown-first) -->
        <div class="ticket-picker">
          <label class="ticket-picker-label">Ticket</label>
          <div class="ticket-dropdown">
            <button type="button" id="ticket-dropdown-btn" class="ticket-dropdown-btn">
              <span id="ticket-dropdown-label" class="ticket-dropdown-label-text">Select a ticket…</span>
              <span class="ticket-dropdown-caret">▾</span>
            </button>
            <div id="ticket-dropdown-menu" class="ticket-dropdown-menu" style="display: none;">
              <div id="ticket-dropdown-list" class="ticket-dropdown-list"></div>
              <div class="ticket-dropdown-search">
                <input type="text" id="ticket-search" placeholder="Search all tickets…" autocomplete="off">
                <button id="search-btn" class="btn btn-secondary">Go</button>
              </div>
              <div id="search-results" class="search-results"></div>
            </div>
          </div>
          <div id="pinned-tickets" class="pinned-tickets" style="display: none;"></div>
        </div>

        <!-- Worklog Entry (extends when ticket selected) -->
        <div id="worklog-section" class="worklog-entry-section" style="display: none;">
          <div class="selected-ticket">
            <span id="selected-ticket-key"></span>
            <span id="selected-ticket-summary"></span>
            <button id="pin-ticket" class="btn-icon btn-pin" title="Pin this ticket">&#9744;</button>
            <button id="clear-ticket" class="btn-icon" title="Clear selection">×</button>
          </div>

          <!-- Collapsed time summary; tap to reveal the editor -->
          <button type="button" id="time-chip" class="time-chip">
            <span class="time-chip-clock">◷</span>
            <span id="time-chip-text" class="time-chip-text">09:00 → 11:00 · 2h 0m</span>
            <span class="time-chip-edit">Edit</span>
          </button>

          <div id="time-editor" class="time-editor" style="display: none;">
            <div class="time-picker-row">
              <div class="time-picker-item">
                <label>Start</label>
                <input type="time" id="start-time" class="time-input-main">
              </div>
              <div class="time-separator">→</div>
              <div class="time-picker-item" id="end-time-container">
                <label>End</label>
                <input type="time" id="end-time" class="time-input-main">
              </div>
              <div class="time-picker-item" id="duration-input-container" style="display: none;">
                <label>Duration</label>
                <div class="duration-inputs">
                  <input type="number" id="duration-hours" class="duration-input" value="8" min="0" max="24" placeholder="h">
                  <span class="duration-unit">h</span>
                  <input type="number" id="duration-minutes" class="duration-input" value="0" min="0" max="59" placeholder="m">
                  <span class="duration-unit">m</span>
                </div>
              </div>
              <div class="duration-display">
                <label id="duration-label">Duration</label>
                <button id="toggle-input-mode" class="duration-badge duration-toggle" title="Click to switch input mode">
                  <span id="duration-display">8h 0m</span>
                </button>
              </div>
            </div>
          </div>

          <div class="form-group">
            <div class="desc-label-row">
              <label for="worklog-desc">Description</label>
              <button id="save-desc-preset" class="btn-save-preset" title="Save current description as a quick-fill preset">+ Save as preset</button>
            </div>
            <textarea id="worklog-desc" rows="2" placeholder="What did you work on?"></textarea>
            <div id="preset-descriptions" class="preset-descriptions"></div>
          </div>

          <div class="submit-row">
            <button id="submit-worklog" class="btn btn-primary">Log Work</button>
          </div>
        </div>
      </section>

      <!-- Card 2: Today's entries -->
      <section class="section today-card">
        <h2>Today</h2>
        <div id="worklog-list" class="worklog-list"></div>
        <div id="worklog-load-status" class="worklog-load-status"></div>
      </section>

      <!-- Card 3: Month -->
      <section class="section month-card">
        <div class="summary-row">
          <span id="month-logged-label" class="summary-label">Month logged:</span>
          <span id="month-logged" class="summary-value month-value">—</span>
        </div>
        <div class="summary-row highlight-month">
          <span id="month-left-label" class="summary-label">Month left:</span>
          <span id="month-left" class="summary-value month-value">—</span>
        </div>
      </section>

      <!-- Status Messages -->
      <div id="status-message" class="status-message"></div>
    </div>

    <!-- Overview Page -->
    <div id="overview-page" class="page" style="display: none;">
      <header>
        <button id="overview-back-btn" class="btn-link overview-back">&#8592; Daily</button>
        <div class="overview-month-nav">
          <button id="overview-prev-month" class="date-nav-btn">&#8249;</button>
          <span id="overview-month-label" class="overview-month-title"></span>
          <button id="overview-next-month" class="date-nav-btn">&#8250;</button>
        </div>
        <button id="overview-reload-btn" class="btn-link" title="Reload month data">&#8635;</button>
      </header>
      <section class="section overview-section">
        <div id="overview-hours-summary" class="overview-hours-summary"></div>
        <div id="overview-summary" class="overview-summary"></div>
        <div id="overview-calendar" class="overview-calendar"></div>
      </section>
      <div id="overview-status" class="worklog-load-status"></div>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
