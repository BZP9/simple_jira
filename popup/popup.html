<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <!-- Login Page -->
    <div id="login-page" class="page">
      <header>
        <h1>Jira Worklog</h1>
      </header>

      <section class="section">
        <h2>Connect to Jira</h2>
        <div class="form-group">
          <label for="jira-domain">Jira Domain</label>
          <input type="text" id="jira-domain" placeholder="yourcompany" maxlength="100" autocomplete="off">
        </div>
        <div class="form-group">
          <label for="jira-email">Email</label>
          <input type="email" id="jira-email" placeholder="your@email.com" maxlength="254" autocomplete="email">
        </div>
        <div class="form-group">
          <label for="jira-token">API Token</label>
          <input type="password" id="jira-token" placeholder="Your Jira API token" maxlength="500" autocomplete="off">
        </div>
        <button id="login-btn" class="btn btn-primary">Connect</button>
        <div id="login-error" class="error-message"></div>
      </section>
    </div>

    <!-- Main Page -->
    <div id="main-page" class="page" style="display: none;">
      <header>
        <h1>Jira Worklog</h1>
        <div class="header-actions">
          <div class="size-buttons">
            <button id="size-sm" class="size-btn" title="Small">S</button>
            <button id="size-md" class="size-btn" title="Medium">M</button>
            <button id="size-lg" class="size-btn" title="Large">L</button>
          </div>
          <button id="logout-btn" class="btn-link">Logout</button>
        </div>
      </header>

      <!-- Part 1: Date Picker -->
      <section class="section date-picker-section">
        <div class="date-picker-header">
          <button type="button" id="prev-day" class="date-nav-btn">‹</button>
          <div class="date-display">
            <input type="date" id="work-date" class="date-input-main">
            <span id="date-label" class="date-label">Today</span>
          </div>
          <button type="button" id="next-day" class="date-nav-btn">›</button>
        </div>
      </section>

      <!-- Part 2: Remaining Time (from Jira) -->
      <section class="section summary-section">
        <div class="summary-row">
          <span class="summary-label">Logged:</span>
          <span id="logged-hours" class="summary-value">0h 0m</span>
        </div>
        <div class="summary-row highlight">
          <span class="summary-label">Remaining:</span>
          <span id="remaining-hours" class="summary-value">8h 0m</span>
        </div>
        <div class="summary-row target-row">
          <span class="summary-label">Daily target:</span>
          <input type="number" id="daily-hours" class="target-input" value="8" min="1" max="24">
          <span>hours</span>
        </div>
        <div id="worklog-list" class="worklog-list"></div>
        <div id="worklog-load-status" class="worklog-load-status"></div>
      </section>

      <!-- Part 3: Ticket Picker -->
      <section class="section">
        <h2>Select Ticket</h2>
        <div class="search-box">
          <input type="text" id="ticket-search" placeholder="Search by ticket number or name...">
          <button id="search-btn" class="btn btn-secondary">Search</button>
        </div>
        <div id="search-results" class="search-results"></div>
      </section>

      <!-- Part 4: Worklog Entry (extends when ticket selected) -->
      <section id="worklog-section" class="section worklog-entry-section" style="display: none;">
        <div class="selected-ticket">
          <span id="selected-ticket-key"></span>
          <span id="selected-ticket-summary"></span>
          <button id="clear-ticket" class="btn-icon" title="Clear selection">×</button>
        </div>

        <div class="time-picker-row">
          <div class="time-picker-item">
            <label>Start</label>
            <input type="time" id="start-time" class="time-input-main">
          </div>
          <div class="time-separator">→</div>
          <div class="time-picker-item" id="end-time-container">
            <label>End</label>
            <input type="time" id="end-time" class="time-input-main">
          </div>
          <div class="time-picker-item" id="duration-input-container" style="display: none;">
            <label>Duration</label>
            <div class="duration-inputs">
              <input type="number" id="duration-hours" class="duration-input" value="8" min="0" max="24" placeholder="h">
              <span class="duration-unit">h</span>
              <input type="number" id="duration-minutes" class="duration-input" value="0" min="0" max="59" placeholder="m">
              <span class="duration-unit">m</span>
            </div>
          </div>
          <div class="duration-display">
            <label id="duration-label">Duration</label>
            <button id="toggle-input-mode" class="duration-badge duration-toggle" title="Click to switch input mode">
              <span id="duration-display">8h 0m</span>
            </button>
          </div>
        </div>

        <div class="form-group">
          <label for="worklog-desc">Work Description</label>
          <textarea id="worklog-desc" rows="2" placeholder="What did you work on?"></textarea>
        </div>

        <button id="submit-worklog" class="btn btn-primary">Log Work</button>
      </section>

      <!-- Status Messages -->
      <div id="status-message" class="status-message"></div>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
